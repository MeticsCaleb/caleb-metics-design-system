<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>YouTube link card — Example</title>
<!-- ARCHETYPE: "link on screen" as a realistic YouTube watch-page UI. SOLID, full-frame.
     Mirrors the MME#17.psd template: title + channel row + action buttons + description box
     with the green-check affiliate line and blue link. The link line highlights so viewers
     see exactly what to click. EDIT the values marked {EDIT}. ~7s. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
/* YouTube uses Roboto; keep it for UI realism. Brand accent stays Inter elsewhere. */
:root{ --accent:#FB411C; --yt-bg:#0F0F0F; --yt-card:#1F1F1F; --yt-text:#F1F1F1; --yt-sub:#AAAAAA; --yt-link:#3EA6FF; }
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;font-family:'Roboto',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
/* do not flex-center the stage — it shrinks below 1920 and offsets content */
#host{position:fixed;inset:0;overflow:hidden}
.stage{position:absolute;top:50%;left:50%;width:1920px;height:1080px;transform-origin:center center;overflow:hidden;background:var(--yt-bg)}
.transport{position:fixed;left:0;right:0;bottom:0;height:42px;display:none;align-items:center;gap:14px;padding:0 16px;z-index:9999;background:rgba(10,10,12,.82);color:#cfd2d6;font:600 13px/1 Inter}
html[data-preview="1"] .transport{display:flex}
.transport button{all:unset;cursor:pointer;padding:4px 10px;border-radius:6px;background:#26272b}.transport input{flex:1}

/* layout */
.page{position:absolute;left:160px;top:120px;width:1600px;color:var(--yt-text)}
.title{font:700 42px/1.25 'Roboto';letter-spacing:-0.2px}
.row{display:flex;align-items:center;justify-content:space-between;margin-top:26px}
.chan{display:flex;align-items:center;gap:18px}
.logo{width:64px;height:64px;border-radius:50%;background:#111;display:flex;align-items:center;justify-content:center;border:1px solid #333}
.logo svg{width:38px;height:38px}
.cmeta .name{display:flex;align-items:center;gap:8px;font:500 28px/1 'Roboto'}
.cmeta .name svg{width:22px;height:22px;opacity:.7}
.cmeta .subs{color:var(--yt-sub);font:400 21px/1 'Roboto';margin-top:6px}
.bell{margin-left:14px;display:flex;align-items:center;gap:10px;background:#272727;color:#fff;border-radius:999px;padding:14px 22px;font:500 22px/1 'Roboto'}
.actions{display:flex;align-items:center;gap:14px}
.btn{display:flex;align-items:center;gap:10px;background:#272727;border-radius:999px;padding:14px 22px;font:500 22px/1 'Roboto';color:#fff}
.btn svg{width:24px;height:24px}
.sep{width:1px;height:26px;background:#555;margin:0 2px}

/* description card */
.desc{position:relative;margin-top:26px;background:var(--yt-card);border-radius:14px;padding:24px 28px;min-height:220px}
.views{font:500 24px/1 'Roboto'}
.aff{margin-top:16px;font:400 28px/1.5 'Roboto';display:flex;align-items:flex-start;gap:12px;position:relative;z-index:2}
.aff .check{font-size:28px;line-height:1.3}
.aff .lnk{color:var(--yt-link)}
/* highlight box behind the affiliate line */
.hl{position:absolute;left:14px;top:64px;height:52px;border-radius:10px;background:rgba(251,65,28,.16);border:2px solid var(--accent);z-index:1;width:0;opacity:0}
/* pointer cursor */
.cursor{position:absolute;z-index:5;width:46px;height:46px;opacity:0}
</style>
</head>
<body>
  <div id="host"><div class="stage" id="stage">
    <div class="page" id="page">
      <!-- {EDIT} title -->
      <div class="title">Coveron Review: Is It the Best Identity Theft Protection?</div>

      <div class="row">
        <div class="chan">
          <div class="logo">
            <!-- real Metics glyph, centered (object-fit:contain); use icon_black.png on light surfaces -->
            <img src="../../assets/Logos/MeticsMedia/icon_white.png" alt="Metics Media" style="width:100%;height:100%;object-fit:contain;padding:12px">
          </div>
          <div class="cmeta">
            <div class="name">Metics Media
              <!-- verified: check in a neutral-gray circle (not the spiky seal) -->
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#aaa"/><path d="M10.6 15.6l-3-3 1.3-1.3 1.7 1.7 4.5-4.5 1.3 1.3z" fill="#0F0F0F"/></svg>
            </div>
            <div class="subs">458K subscribers</div>
          </div>
          <div class="bell">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="#fff"><path d="M12 22a2.5 2.5 0 002.45-2h-4.9A2.5 2.5 0 0012 22zm7-6v-5a7 7 0 10-14 0v5l-2 2v1h18v-1z"/></svg>
            <span>Subscribed</span>
            <svg viewBox="0 0 24 24" width="18" height="18" fill="#fff"><path d="M7 10l5 5 5-5z"/></svg>
          </div>
        </div>
        <div class="actions">
          <div class="btn"><svg viewBox="0 0 24 24" fill="#fff"><path d="M1 21h4V9H1v12zM23 10a2 2 0 00-2-2h-6.3l1-4.6V3a1.5 1.5 0 00-1.5-1.5L7 9v12h11a2 2 0 002-1.7l1.9-7.3z"/></svg>1.3K<span class="sep"></span><svg viewBox="0 0 24 24" fill="#fff"><path d="M23 3h-4v12h4V3zM1 14a2 2 0 002 2h6.3l-1 4.6V21a1.5 1.5 0 001.5 1.5L17 15V3H6a2 2 0 00-2 1.7L1 14z"/></svg></div>
          <div class="btn"><svg viewBox="0 0 24 24" fill="#fff"><path d="M14 9V5l7 7-7 7v-4C7 14 4 19 4 19c0-7 3-10 10-10z"/></svg>Share</div>
          <div class="btn"><svg viewBox="0 0 24 24" fill="#fff"><path d="M12 16l-6-6h4V4h4v6h4l-6 6zM4 18h16v2H4z"/></svg>Download</div>
          <div class="btn"><svg viewBox="0 0 24 24" fill="#fff"><path d="M12 21s-7-4.5-9.5-8.5C.8 9.7 2 6.5 5 6.5c1.8 0 3 1 3.5 2 0 0 0 0 .5 0s.5-2 2.5-2c3 0 4.2 3.2 2.5 6C19 16.5 12 21 12 21z"/></svg>Thanks</div>
        </div>
      </div>

      <div class="desc" id="desc">
        <div class="views">8,432 views</div>
        <div class="hl" id="hl"></div>
        <div class="aff">
          <span class="check">✅</span>
          <!-- {EDIT} offer + affiliate link -->
          <span><b>Coveron (Exclusive Discount):</b> <span class="lnk">https://meticsmedia.com/coveron-QQH</span></span>
        </div>
      </div>
    </div>

    <svg class="cursor" id="cursor" viewBox="0 0 24 24" fill="#fff" stroke="#000" stroke-width="1"><path d="M4 2l16 9-7 1.5L9 20 4 2z"/></svg>
  </div></div>

  <div class="transport">
    <button onclick="playStory()">▶</button><button onclick="pauseStory()">❚❚</button>
    <input type="range" min="0" max="1000" value="0" oninput="setStoryTime(this.value/1000*STORY_DURATION)">
    <span id="tc">0.00</span>
  </div>
<script>
const clamp01=u=>Math.max(0,Math.min(1,u));
const easeOutCubic=u=>1-Math.pow(1-clamp01(u),3);
const easeInCubic=u=>Math.pow(clamp01(u),3);
const easeOutBack=(u,s=1.4)=>{u=clamp01(u);return 1+(s+1)*Math.pow(u-1,3)+s*Math.pow(u-1,2)};
const lerp=(t,a,b,v0,v1,e=easeOutCubic)=>{if(t<=a)return v0;if(t>=b)return v1;return v0+(v1-v0)*e((t-a)/(b-a))};
const visible=(t,tin,tout,fi=0.4,fo=0.5)=>{if(t<tin||t>tout)return 0;if(t<tin+fi)return easeOutCubic((t-tin)/fi);if(t>tout-fo)return 1-easeInCubic((t-(tout-fo))/fo);return 1};

/* (1) CONFIG */
const STORY_DURATION=7.0, STORY_FPS=30, STAGE_BG='solid-dark';
const STORY_BEATS=[{id:'page',in:0.0,out:7.0},{id:'highlight',in:1.2,out:7.0},{id:'cursor',in:1.4,out:7.0}];

/* (2) BUILD + RENDER */
const stage=document.getElementById('stage');
const page=document.getElementById('page'), hl=document.getElementById('hl'),
      cursor=document.getElementById('cursor'), desc=document.getElementById('desc');
function render(t){
  // page settles in
  page.style.opacity = lerp(t,0,0.5,0,1);
  page.style.transform = `translateY(${lerp(t,0,0.6,16,0,easeOutCubic)}px)`;
  // highlight box sweeps across the affiliate line
  const w = lerp(t,1.2,1.9,0,920,easeOutCubic);
  hl.style.width = w+'px';
  hl.style.opacity = visible(t,1.2,7.0,0.3,0.4);
  // cursor glides toward the link, then a small click "tap"
  const cop = lerp(t,1.4,1.8,0,1);
  const cx = lerp(t,1.4,2.4,1180,560,easeOutCubic);
  const cy = lerp(t,1.4,2.4,560,360,easeOutCubic);
  const tap = Math.max(0, Math.sin(Math.max(0,t-2.5)*6)) * (t>2.5&&t<3.3?6:0);
  cursor.style.opacity = cop;
  cursor.style.left = (cx+tap)+'px';
  cursor.style.top  = (cy+tap)+'px';
}

/* HARNESS — do not edit */
let _t=0,_p=false,_r=null,_l=0;
function setStoryTime(s){_p=false;cancelAnimationFrame(_r);_t=Math.max(0,Math.min(STORY_DURATION,s));render(_t);_tc()}
function playStory(){if(_p)return;_p=true;_l=performance.now();_lp()}
function pauseStory(){_p=false;cancelAnimationFrame(_r)}
function _lp(){const n=performance.now();_t+=(n-_l)/1000;_l=n;if(_t>=STORY_DURATION){_t=STORY_DURATION;render(_t);_p=false;_tc();return}render(_t);_tc();_r=requestAnimationFrame(_lp)}
function _tc(){const e=document.getElementById('tc');if(e)e.textContent=_t.toFixed(2)}
window.setStoryTime=setStoryTime;window.playStory=playStory;window.pauseStory=pauseStory;
window.STORY_DURATION=STORY_DURATION;window.STORY_FPS=STORY_FPS;window.STORY_BEATS=STORY_BEATS;
function _fit(){stage.style.transform=`translate(-50%,-50%) scale(${Math.min(innerWidth/1920,innerHeight/1080)})`}addEventListener('resize',_fit);_fit();
const P=new URLSearchParams(location.search);
if(P.get('preview')==='1')document.documentElement.setAttribute('data-preview','1');
const T0=parseFloat(P.get('t'));
render(0); if(isFinite(T0))setStoryTime(T0); else if(P.get('autoplay')!=='0')playStory();
window.__storyReady=true;
</script>
</body>
</html>
